<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid slice">
  <title id="title">Images coming soon</title>
  <desc id="desc">A Hilltro branded placeholder shown for property listings that do not yet have uploaded photos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF3F5"/>
      <stop offset="0.55" stop-color="#F4EEEA"/>
      <stop offset="1" stop-color="#F8EDE5"/>
    </linearGradient>
    <linearGradient id="ink" x1="600" y1="332" x2="600" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E08A55"/>
      <stop offset="1" stop-color="#D2752F"/>
    </linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="120"/></filter>
  </defs>

  <!-- soft base -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- blurred colour wash: a light wash of the logo orange + a cool counterpoint -->
  <g filter="url(#blur)">
    <ellipse cx="830" cy="250" rx="360" ry="300" fill="#F4B488" opacity="0.55"/>
    <ellipse cx="300" cy="600" rx="340" ry="300" fill="#AEC6D2" opacity="0.50"/>
    <ellipse cx="600" cy="430" rx="300" ry="240" fill="#FBFAF8" opacity="0.65"/>
  </g>

  <!-- minimal image glyph -->
  <g transform="translate(600 356)" fill="none" stroke="url(#ink)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-46" y="-36" width="92" height="72" rx="14"/>
    <circle cx="-19" cy="-12" r="9"/>
    <path d="M-40 30 L-13 0 L6 19 L23 4 L42 26"/>
  </g>

  <!-- copy -->
  <text x="600" y="486" text-anchor="middle" fill="#42525C" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-0.8">Images Coming Soon</text>
  <text x="600" y="528" text-anchor="middle" fill="#8497A0" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="0.2">Photography is on its way</text>
</svg>
