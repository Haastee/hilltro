<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haaste | Rent in 5 clicks</title>
    <meta name="description" content="Haaste is a UK rental operating system for search, referencing, offers, APT signing, deposits and rent." />
    <meta name="theme-color" content="#3d535b" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <script>
      (function () {
        var redirect = sessionStorage.getItem("haaste.github-pages.redirect");
        if (redirect) {
          sessionStorage.removeItem("haaste.github-pages.redirect");
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
