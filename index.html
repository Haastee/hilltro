<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <title>Hilltro | Rent in 5 clicks</title>
    <meta name="description" content="Hilltro is a UK rental operating system for search, referencing, offers, APT signing, deposits and rent." />
    <link rel="canonical" href="https://hilltro.com/" />
    <meta property="og:title" content="Hilltro | Rent in 5 clicks" />
    <meta property="og:description" content="Hilltro is a UK rental operating system for search, referencing, offers, APT signing, deposits and rent." />
    <meta property="og:url" content="https://hilltro.com/" />
    <meta property="og:site_name" content="Hilltro" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://hilltro.com/assets/branding/hilltro-logo.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hilltro | Rent in 5 clicks" />
    <meta name="twitter:description" content="Hilltro is a UK rental operating system for search, referencing, offers, APT signing, deposits and rent." />
    <meta name="twitter:image" content="https://hilltro.com/assets/branding/hilltro-logo.svg" />
    <meta name="theme-color" content="#B84E1A" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-light.png?v=hilltro-favicon-5" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-light.png?v=hilltro-favicon-5" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-dark.png?v=hilltro-favicon-5" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="%BASE_URL%favicon.ico?v=hilltro-favicon-5" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png?v=hilltro-favicon-5" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png?v=hilltro-favicon-5" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png?v=hilltro-favicon-5" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <script>
      (function () {
        var baseUrl = "%BASE_URL%";
        var darkQuery = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
        var setFavicon = function () {
          var preferred = darkQuery && darkQuery.matches ? "favicon-dark.png" : "favicon-light.png";
          var themedIcon = document.querySelector('link[rel~="icon"][type="image/png"]:not([media])');
          if (themedIcon) {
            themedIcon.setAttribute("href", baseUrl + preferred + "?v=hilltro-favicon-5");
          }
        };
        setFavicon();
        if (darkQuery) {
          if (darkQuery.addEventListener) {
            darkQuery.addEventListener("change", setFavicon);
          } else if (darkQuery.addListener) {
            darkQuery.addListener(setFavicon);
          }
        }
      })();
    </script>
    <script>
      (function () {
        var redirect = sessionStorage.getItem("hilltro.github-pages.redirect");
        if (redirect) {
          sessionStorage.removeItem("hilltro.github-pages.redirect");
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
